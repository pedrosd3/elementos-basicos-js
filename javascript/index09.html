<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Pedro Ferreira da Silva">
    <title>Exemplo de document.write após carregamento</title>
</head>

<body>
    <h2>Exemplo de document.write após carregamento</h2>
    <p>Exemplo de document.write após carregamento</p>
    <!-- O uso de document.write () após o carregamento de um documento HTML excluirá todos os HTML existentes -->
    <!-- O método document.write () deve ser usado apenas para teste. -->
    <button type="button" onclick="document.write(2 + 2)">Clique aqui</button>
</body>

</html>
